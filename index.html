<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phóng xạ</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 1000px; margin: auto; }
        h1 { color: #2c3e50; font-size: 2.5em; margin-bottom: 30px; }
        
        /* Dashboard hiển thị số liệu LED */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-bottom: 6px solid #3498db; }
        .card h3 { margin: 0; color: #7f8c8d; font-size: 1em; text-transform: uppercase; }
        .card .value { font-size: 3em; font-weight: bold; margin: 10px 0; color: #2c3e50; }
        .card .unit { color: #95a5a6; font-size: 1.1em; }

        /* Biểu đồ diễn biến */
        .chart-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px; height: 400px; }

        /* Bảng nhật ký */
        .table-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        th { background-color: #3498db; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }

        /* Trạng thái an toàn */
        .badge { padding: 5px 10px; border-radius: 20px; font-weight: bold; }
        .badge-safe { background: #d4edda; color: #155724; }
        .badge-warn { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <h1>☢️ PHÓNG XẠ</h1>

    <div class="stats-grid">
        <div class="card">
            <h3>Tốc độ đếm</h3>
            <div class="value" id="cpm">0</div>
            <div class="unit">CPM</div>
        </div>
        <div class="card">
            <h3>Suất liều</h3>
            <div class="value" id="usvh">0.000</div>
            <div class="unit">$\mu Sv/h$</div>
        </div>
        <div id="status-card" class="card">
            <h3>Cảnh báo</h3>
            <div class="value" id="status" style="font-size: 1.8em;">--</div>
        </div>
    </div>

    <div class="chart-box">
        <canvas id="radiationChart"></canvas>
    </div>

    <div class="table-box">
        <h3>NHẬT KÝ ĐO CHI TIẾT (LẤY GIỜ TỪ THIẾT BỊ)</h3>
        <table id="logTable">
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Thời điểm</th>
                    <th>Số hạt (15s)</th>
                    <th>CPM</th>
                    <th>Suất liều ($\mu Sv/h$)</th>
                    <th>Trạng thái</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    // --- CẤU HÌNH THÔNG SỐ FIREBASE (ĐÃ KHỚP VỚI CỦA BẠN) ---
    const firebaseConfig = {
        apiKey: "AIzaSyB67-4w3DKnrbVPgnGhcJYCxA3pkm1CIOA",
        databaseURL: "https://geiger-55c26-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // --- CẤU HÌNH BIỂU ĐỒ ---
    const ctx = document.getElementById('radiationChart').getContext('2d');
    const radChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [], 
            datasets: [{
                label: 'Suất liều ($\mu Sv/h$)',
                data: [],
                borderColor: '#e74c3c',
                backgroundColor: 'rgba(231, 76, 60, 0.1)',
                borderWidth: 2,
                fill: true,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { y: { beginAtZero: true } }
        }
    });

    let rowCounter = 0;

    // --- LẮNG NGHE DỮ LIỆU TỪ NHÁNH "Logs" ---
    database.ref('Logs').limitToLast(100).on('child_added', (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        // ƯU TIÊN LẤY GIỜ TỪ FIREBASE DO ESP32 GỬI LÊN
        const timeFromESP = data.Time || "Đang lấy..."; 

        // 1. Cập nhật các thẻ chỉ số chính
        document.getElementById('cpm').innerText = data.CPM;
        document.getElementById('usvh').innerText = data.uSvh.toFixed(3);
        document.getElementById('status').innerText = data.Status;

        const sCard = document.getElementById('status-card');
        if (data.Status === "Safety") {
            sCard.style.borderBottomColor = "#2ecc71";
            document.getElementById('status').style.color = "#2ecc71";
        } else {
            sCard.style.borderBottomColor = "#e74c3c";
            document.getElementById('status').style.color = "#e74c3c";
        }

        // 2. Vẽ lên biểu đồ
        if (radChart.data.labels.length > 100) {
            radChart.data.labels.shift();
            radChart.data.datasets[0].data.shift();
        }
        radChart.data.labels.push(timeFromESP); // Dùng giờ từ thiết bị
        radChart.data.datasets[0].data.push(data.uSvh);
        radChart.update();

        // 3. Cập nhật bảng thống kê (Dòng mới lên đầu)
        rowCounter++;
        const tableBody = document.querySelector("#logTable tbody");
        const newRow = tableBody.insertRow(0);
        const badgeClass = data.Status === "Safety" ? "badge-safe" : "badge-warn";
        
        newRow.innerHTML = `
            <td>${rowCounter}</td>
            <td>${timeFromESP}</td>
            <td>${data.LastCount}</td>
            <td>${data.CPM}</td>
            <td>${data.uSvh.toFixed(3)}</td>
            <td><span class="badge ${badgeClass}">${data.Status}</span></td>
        `;
    });
</script>

</body>
</html>
