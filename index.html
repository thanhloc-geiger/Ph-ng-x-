<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phóng xạ</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --primary: #2c3e50; --danger: #e74c3c; --success: #2ecc71; --accent: #3498db; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f8f9fa; color: var(--primary); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        
        h1 { text-align: center; font-size: 2.5em; margin-bottom: 30px; letter-spacing: 2px; }
        
        /* Dashboard Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-align: center; border-bottom: 6px solid var(--accent); transition: transform 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card h3 { margin: 0; color: #7f8c8d; font-size: 1em; text-transform: uppercase; }
        .card .value { font-size: 3em; font-weight: bold; margin: 15px 0; display: block; }
        .card .unit { font-size: 1.1em; color: #95a5a6; }

        /* Status colors */
        .status-safe { border-bottom-color: var(--success); }
        .status-warn { border-bottom-color: var(--danger); }

        /* Chart & Table Section */
        .main-content { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .chart-box { height: 450px; margin-bottom: 40px; }
        
        .table-box { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #eee; }
        th { background-color: var(--accent); color: white; font-weight: 600; }
        tr:nth-child(even) { background-color: #fafafa; }
        tr:hover { background-color: #f1f4f7; }

        .badge { padding: 5px 12px; border-radius: 20px; font-size: 0.85em; font-weight: bold; }
        .badge-safe { background: #d4edda; color: #155724; }
        .badge-danger { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <h1>☢️ PHÓNG XẠ</h1>

    <div class="stats-grid">
        <div class="card">
            <h3>Tốc độ đếm</h3>
            <span class="value" id="cpm">0</span>
            <span class="unit">CPM</span>
        </div>
        <div class="card">
            <h3>Suất liều</h3>
            <span class="value" id="usvh">0.000</span>
            <span class="unit">$\mu Sv/h$</span>
        </div>
        <div class="card" id="status-card">
            <h3>Trạng thái</h3>
            <span class="value" id="status" style="font-size: 1.8em; line-height: 1.6;">Đang kết nối...</span>
            <span class="unit" id="timestamp">--:--:--</span>
        </div>
    </div>

    <div class="main-content">
        <div class="chart-box">
            <canvas id="radiationChart"></canvas>
        </div>

        <div class="table-box">
            <h3>NHẬT KÝ ĐO CHI TIẾT (100 ĐIỂM GẦN NHẤT)</h3>
            <table id="historyTable">
                <thead>
                    <tr>
                        <th>STT</th>
                        <th>Thời điểm</th>
                        <th>Số hạt (15s)</th>
                        <th>CPM</th>
                        <th>Suất liều ($\mu Sv/h$)</th>
                        <th>Đánh giá</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- CẤU HÌNH THÔNG SỐ FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyB67-4w3DKnrbVPgnGhcJYCxA3pkm1CIOA",
        databaseURL: "https://geiger-55c26-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // --- CẤU HÌNH BIỂU ĐỒ (CHART.JS) ---
    const ctx = document.getElementById('radiationChart').getContext('2d');
    const radChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [], 
            datasets: [{
                label: 'Suất liều ($\mu Sv/h$)',
                data: [],
                borderColor: '#3498db',
                backgroundColor: 'rgba(52, 152, 219, 0.1)',
                borderWidth: 3,
                pointRadius: 4,
                pointBackgroundColor: '#2c3e50',
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { beginAtZero: true, grid: { color: '#eee' } },
                x: { grid: { display: false } }
            },
            plugins: { legend: { display: true, position: 'top' } }
        }
    });

    let counter = 0;

    // --- XỬ LÝ DỮ LIỆU LỊCH SỬ VÀ THỜI GIAN THỰC ---
    // Hàm này sẽ tự động chạy cho mỗi bản ghi tìm thấy trong nhánh 'Logs'
    database.ref('Logs').limitToLast(100).on('child_added', (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        counter++;
        const now = new Date().toLocaleTimeString('vi-VN');

        // 1. Cập nhật thẻ chỉ số (Luôn lấy cái mới nhất)
        document.getElementById('cpm').innerText = data.CPM;
        document.getElementById('usvh').innerText = data.uSvh.toFixed(3);
        document.getElementById('status').innerText = data.Status;
        document.getElementById('timestamp').innerText = now;

        const sCard = document.getElementById('status-card');
        if (data.Status === "Safety") {
            sCard.style.borderBottomColor = "#2ecc71";
            document.getElementById('status').style.color = "#2ecc71";
        } else {
            sCard.style.borderBottomColor = "#e74c3c";
            document.getElementById('status').style.color = "#e74c3c";
        }

        // 2. Vẽ lên biểu đồ
        if (radChart.data.labels.length > 100) {
            radChart.data.labels.shift();
            radChart.data.datasets[0].data.shift();
        }
        radChart.data.labels.push(now);
        radChart.data.datasets[0].data.push(data.uSvh);
        radChart.update('none'); // Update nhanh không hiệu ứng để mượt

        // 3. Ghi vào bảng (Dòng mới nhất đẩy lên đầu)
        const table = document.getElementById('historyTable').getElementsByTagName('tbody')[0];
        const row = table.insertRow(0);
        const statusBadge = data.Status === "Safety" ? 'badge-safe' : 'badge-danger';
        
        row.innerHTML = `
            <td>${counter}</td>
            <td>${now}</td>
            <td>${data.LastCount}</td>
            <td>${data.CPM}</td>
            <td>${data.uSvh.toFixed(3)}</td>
            <td><span class="badge ${statusBadge}">${data.Status}</span></td>
        `;
    });
</script>

</body>
</html>
