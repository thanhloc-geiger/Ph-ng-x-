<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phóng xạ</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f4f8; color: #333; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 1100px; margin: auto; }
        h1 { color: #2c3e50; font-size: 2.5em; margin-bottom: 30px; }
        
        /* Dashboard Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-bottom: 6px solid #3498db; }
        .card .value { font-size: 3em; font-weight: bold; color: #2c3e50; display: block; margin: 10px 0; }
        .card .unit { color: #95a5a6; font-size: 1.1em; }

        /* Chart */
        .chart-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px; height: 400px; }

        /* Table & Export Button */
        .table-box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow-x: auto; }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        
        .btn-excel { 
            background-color: #27ae60; color: white; border: none; padding: 12px 25px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1em;
            transition: background 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .btn-excel:hover { background-color: #219150; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #eee; }
        th { background-color: #3498db; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .badge { padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9em; }
        .badge-safe { background: #d4edda; color: #155724; }
        .badge-warn { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <h1>☢️ PHÓNG XẠ</h1>

    <div class="stats-grid">
        <div class="card">
            <h3>Tốc độ đếm</h3>
            <span class="value" id="cpm">0</span>
            <span class="unit">CPM</span>
        </div>
        <div class="card">
            <h3>Suất liều</h3>
            <span class="value" id="usvh">0.000</span>
            <span class="unit">$\mu Sv/h$</span>
        </div>
        <div id="status-card" class="card">
            <h3>Trạng thái</h3>
            <span class="value" id="status" style="font-size: 1.8em;">--</span>
            <span id="last-update" style="color: #95a5a6; font-size: 0.9em;">Đang đợi dữ liệu...</span>
        </div>
    </div>

    <div class="chart-box">
        <canvas id="radChart"></canvas>
    </div>

    <div class="table-box">
        <div class="table-header">
            <h3>NHẬT KÝ ĐO CHI TIẾT</h3>
            <button class="btn-excel" onclick="exportToExcel()">
                📊 Xuất Báo Cáo Excel
            </button>
        </div>
        <table id="logTable">
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Thời điểm</th>
                    <th>Số hạt (15s)</th>
                    <th>CPM</th>
                    <th>Suất liều ($\mu Sv/h$)</th>
                    <th>Đánh giá</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    // --- 1. CẤU HÌNH FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyB67-4w3DKnrbVPgnGhcJYCxA3pkm1CIOA",
        databaseURL: "https://geiger-55c26-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- 2. CẤU HÌNH BIỂU ĐỒ ---
    const ctx = document.getElementById('radChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [], 
            datasets: [{
                label: 'Suất liều ($\mu Sv/h$)',
                data: [],
                borderColor: '#3498db',
                backgroundColor: 'rgba(52, 152, 219, 0.1)',
                borderWidth: 2,
                fill: true,
                tension: 0.3
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });

    let count = 0;

    // --- 3. NHẬN DỮ LIỆU TỪ FIREBASE ---
    db.ref('Logs').limitToLast(100).on('child_added', (snapshot) => {
        const data = snapshot.val();
        const time = data.Time || "--:--:--";
        count++;

        // Cập nhật thẻ
        document.getElementById('cpm').innerText = data.CPM;
        document.getElementById('usvh').innerText = data.uSvh.toFixed(3);
        document.getElementById('status').innerText = data.Status;
        document.getElementById('last-update').innerText = "Cập nhật lúc: " + time;

        const sCard = document.getElementById('status-card');
        sCard.style.borderBottomColor = data.Status === "Safety" ? "#2ecc71" : "#e74c3c";
        document.getElementById('status').style.color = data.Status === "Safety" ? "#2ecc71" : "#e74c3c";

        // Cập nhật biểu đồ
        if (chart.data.labels.length > 50) {
            chart.data.labels.shift();
            chart.data.datasets[0].data.shift();
        }
        chart.data.labels.push(time);
        chart.data.datasets[0].data.push(data.uSvh);
        chart.update();

        // Cập nhật bảng
        const table = document.getElementById('logTable').getElementsByTagName('tbody')[0];
        const row = table.insertRow(0);
        const badge = data.Status === "Safety" ? "badge-safe" : "badge-warn";
        row.innerHTML = `
            <td>${count}</td>
            <td>${time}</td>
            <td>${data.LastCount}</td>
            <td>${data.CPM}</td>
            <td>${data.uSvh.toFixed(3)}</td>
            <td><span class="badge ${badge}">${data.Status}</span></td>
        `;
    });

    // --- 4. HÀM XUẤT EXCEL (CSV) ---
    function exportToExcel() {
        let csv = "\uFEFF"; // Thêm BOM để hiển thị tiếng Việt trong Excel
        csv += "STT,Thoi diem,So hat (15s),CPM,Suat lieu (uSv/h),Danh gia\n";
        
        const rows = document.querySelectorAll("#logTable tbody tr");
        rows.forEach(row => {
            const cols = row.querySelectorAll("td");
            let rowData = [];
            cols.forEach(col => rowData.push(col.innerText));
            csv += rowData.join(",") + "\n";
        });

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", "Bao_cao_Phong_xa_11A11.csv");
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
